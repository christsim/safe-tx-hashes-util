name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      - name: Generate version
        id: version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="build-${COMMIT_COUNT}-${SHORT_SHA}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Generated version: ${VERSION}"

      - name: Create release zip
        run: |
          mkdir -p release
          cp safe_hashes.sh release/
          cp safe_eth_hashes.sh release/
          cp safe_erc20_hashes.sh release/
          cp web/dist/safe-tx-hashes.html release/
          cp web/dist/safe-tx-hashes.html.sha256 release/
          cd release && zip -r "../safe-tx-hashes-${{ steps.version.outputs.VERSION }}.zip" .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ steps.version.outputs.VERSION }}
          files: |
            safe-tx-hashes-${{ steps.version.outputs.VERSION }}.zip
            web/dist/safe-tx-hashes.html
            web/dist/safe-tx-hashes.html.sha256
